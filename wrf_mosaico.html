<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Viewer WRF (1–97) — otimizado</title>

  <!-- Ajuda a reduzir latência de conexão -->
  <link rel="dns-prefetch" href="//sigmameteorologia.com">
  <link rel="preconnect" href="https://sigmameteorologia.com" crossorigin>

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b0f14; color: #e6edf3;
      display: grid; grid-template-rows: auto 1fr auto;
      height: 100vh;
    }
    header, footer {
      padding: 10px 14px; background: #0f1620; border-bottom: 1px solid #1f2a37;
    }
    footer { border-top: 1px solid #1f2a37; border-bottom: none; }
    .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .bar > * { font-size: 14px; }
    button, input {
      background: #111a25; color: #e6edf3; border: 1px solid #223042;
      border-radius: 10px; padding: 8px 10px;
    }
    button { cursor: pointer; }
    button:hover { border-color: #3a4b63; }
    input { width: 90px; }
    main {
      display: grid; place-items: center;
      overflow: auto;
      padding: 12px;
    }
    .frameWrap { position: relative; }
    img {
      max-width: min(1200px, 98vw);
      max-height: 86vh;
      width: auto; height: auto;
      border-radius: 14px;
      border: 1px solid #223042;
      background: #0f1620;
      display: block;
    }
    .spinner {
      position: absolute;
      inset: 10px auto auto 10px;
      background: rgba(17,26,37,.85);
      border: 1px solid #223042;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: #9fb0c3;
      user-select: none;
    }
    .muted { color: #9fb0c3; }
    a { color: #9bd1ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .hint kbd {
      background:#111a25; border:1px solid #223042; border-bottom-width:2px;
      padding:2px 6px; border-radius:8px; font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <strong>WRF mosaico chuva (acumulado total RS)</strong>
      <span class="muted">|</span>
      <span>Frame: <strong id="idxLabel">1</strong> / <span id="maxLabel">97</span></span>

      <span class="muted">|</span>
      <button id="prevBtn" title="Anterior (←)">← Anterior</button>
      <button id="nextBtn" title="Próximo (→)">Próximo →</button>

      <span class="muted">|</span>
      <label>
        Ir para:
        <input id="gotoInput" type="number" min="1" max="97" step="1" value="1" />
      </label>
      <button id="gotoBtn">OK</button>

      <span class="muted">|</span>
      <label title="0 = desliga. 1–3 = recomendado (prefetch leve, não preload total).">
        prefetch próximo:
        <input id="prefetchInput" type="number" min="0" max="6" step="1" value="2" style="width:70px" />
      </label>
    </div>

    <div class="bar muted hint" style="margin-top:8px">
      Teclado: <kbd>←</kbd>/<kbd>→</kbd> navega • <kbd>Home</kbd> vai para 1 • <kbd>End</kbd> vai para 97
    </div>
  </header>

  <main>
    <div class="frameWrap">
      <img id="img" alt="WRF frame" decoding="async" />
      <div id="spinner" class="spinner" style="display:none;">carregando…</div>
    </div>
  </main>

  <footer>
    <div class="bar">
      <span class="muted">URL:</span>
      <a id="urlLink" href="#" target="_blank" rel="noreferrer noopener">—</a>
      <span id="status" class="muted"></span>
    </div>
  </footer>

<script>
(() => {
  // ======= CONFIG =======
  const BASE =
    "https://sigmameteorologia.com/produtos/wrf_produtos//wrf_mosaico_chuva_acum_total_rs_00z_";
  const EXT = ".png";
  const MIN = 1;
  const MAX = 97;

  // Cache em memória (evita baixar de novo ao voltar). Ajuste conforme sua RAM.
  const CACHE_LIMIT = 18; // 97 é pesado; 12–24 costuma ser um bom equilíbrio.

  // ======= STATE =======
  let idx = MIN;
  let navToken = 0; // evita “corrida” ao apertar setas muito rápido

  // LRU cache: idx -> { img: HTMLImageElement, at: number }
  const cache = new Map();

  // ======= ELEMENTS =======
  const imgEl = document.getElementById("img");
  const spinner = document.getElementById("spinner");
  const idxLabel = document.getElementById("idxLabel");
  const maxLabel = document.getElementById("maxLabel");
  const urlLink = document.getElementById("urlLink");
  const statusEl = document.getElementById("status");

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const gotoInput = document.getElementById("gotoInput");
  const gotoBtn = document.getElementById("gotoBtn");
  const prefetchInput = document.getElementById("prefetchInput");

  maxLabel.textContent = String(MAX);
  gotoInput.max = String(MAX);

  function makeUrl(n) { return `${BASE}${n}${EXT}`; }
  function clamp(n) { return Math.min(MAX, Math.max(MIN, n)); }

  function setStatus(text) { statusEl.textContent = text ? `| ${text}` : ""; }
  function showSpinner(on) { spinner.style.display = on ? "" : "none"; }

  // Mantém cache pequeno e recente (LRU)
  function touchCache(key, entry) {
    cache.delete(key);
    cache.set(key, entry);
    while (cache.size > CACHE_LIMIT) {
      const oldestKey = cache.keys().next().value;
      cache.delete(oldestKey);
    }
  }

  function getCached(n) {
    const entry = cache.get(n);
    if (!entry) return null;
    touchCache(n, entry);
    return entry.img;
  }

  async function loadImage(n, { priority = "high" } = {}) {
    // Se já está em cache, retorna
    const cached = getCached(n);
    if (cached) return cached;

    const url = makeUrl(n);

    const im = new Image();
    im.decoding = "async";
    // fetchPriority ajuda em navegadores modernos (não quebra nos outros)
    try { im.fetchPriority = priority; } catch (_) {}

    const p = new Promise((resolve, reject) => {
      im.onload = resolve;
      im.onerror = reject;
      im.src = url;
    });

    // Espera baixar
    await p;

    // Tenta decodificar antes de trocar (reduz “engasgo”)
    if (im.decode) {
      try { await im.decode(); } catch (_) {}
    }

    touchCache(n, { img: im, at: Date.now() });
    return im;
  }

  function updateHeader() {
    idxLabel.textContent = String(idx);
    gotoInput.value = String(idx);

    const url = makeUrl(idx);
    urlLink.textContent = url;
    urlLink.href = url;
  }

  // Render com “swap” só quando pronto
  async function render(targetIdx) {
    const myToken = ++navToken;
    idx = clamp(targetIdx);
    updateHeader();

    showSpinner(true);
    setStatus("carregando…");

    try {
      const im = await loadImage(idx, { priority: "high" });
      // Se no meio do caminho o usuário navegou, descarta este render
      if (myToken !== navToken) return;

      imgEl.src = im.src;
      showSpinner(false);
      setStatus("");

      // Prefetch leve do próximo(s), em idle time (não é preload geral)
      schedulePrefetch();
    } catch (e) {
      if (myToken !== navToken) return;
      showSpinner(false);
      setStatus("erro ao carregar (imagem pode não existir ou hotlink bloqueado)");
    }
  }

  function schedulePrefetch() {
    const k = clamp(parseInt(prefetchInput.value, 10) || 0);
    if (k <= 0) return;

    const start = idx + 1;
    const end = Math.min(MAX, idx + k);

    const job = async () => {
      for (let n = start; n <= end; n++) {
        // se já estiver em cache, pula
        if (cache.has(n)) continue;
        try { await loadImage(n, { priority: "low" }); } catch (_) {}
      }
    };

    // Usa idle time quando disponível, senão usa timeout curto
    if ("requestIdleCallback" in window) {
      requestIdleCallback(() => job(), { timeout: 800 });
    } else {
      setTimeout(job, 60);
    }
  }

  function prev() { render(idx - 1); }
  function next() { render(idx + 1); }

  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);

  function goToValue() {
    const n = clamp(parseInt(gotoInput.value, 10));
    render(n);
  }
  gotoBtn.addEventListener("click", goToValue);
  gotoInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") goToValue();
  });

  // Teclado
  window.addEventListener("keydown", (e) => {
    const tag = (document.activeElement?.tagName || "").toLowerCase();
    const isTyping = tag === "input" || tag === "textarea";
    if (isTyping && e.key !== "Escape") return;

    if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
    else if (e.key === "ArrowRight") { e.preventDefault(); next(); }
    else if (e.key === "Home") { e.preventDefault(); render(MIN); }
    else if (e.key === "End") { e.preventDefault(); render(MAX); }
  });

  // ======= INIT =======
  updateHeader();
  // Começa na imagem 1
  render(MIN);
})();
</script>
</body>
</html>
