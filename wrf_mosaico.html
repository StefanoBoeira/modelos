<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mosaico WRF — 00z/12z</title>

  <link rel="dns-prefetch" href="//sigmameteorologia.com">
  <link rel="preconnect" href="https://sigmameteorologia.com" crossorigin>

  <style>
    :root { color-scheme: dark; }
    body{
      margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:#0b0f14; color:#e6edf3;
      display:grid; grid-template-rows:auto 1fr auto;
      height:100vh;
    }
    header, footer{
      padding:10px 14px; background:#0f1620; border-bottom:1px solid #1f2a37;
    }
    footer{ border-top:1px solid #1f2a37; border-bottom:none; }

    .bar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .bar > *{ font-size:14px; }
    .barSplit{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px; }
    .barSplit .right{ margin-left:auto; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    button, input, select{
      background:#111a25; color:#e6edf3; border:1px solid #223042;
      border-radius:10px; padding:8px 10px;
    }
    button{ cursor:pointer; }
    button:hover{ border-color:#3a4b63; }
    button:disabled{ opacity:.65; cursor:not-allowed; }

    select{ padding-right:28px; }
    input{ width:64px; }                 /* reduz “Ir para” */
    .tinyInput{ width:54px; }            /* reduz “prefetch” */
    .muted{ color:#9fb0c3; }

    /* Viewport rolável para pan/zoom */
    main{ overflow:hidden; padding:12px; }
    #viewport{
      width:100%; height:100%;
      overflow:auto;
      display:flex; align-items:flex-start; justify-content:flex-start;
      cursor:grab;
    }
    #viewport.dragging{ cursor:grabbing; }
    .frameWrap{ position:relative; margin:auto; }

    img{
      border-radius:0;
      max-width:none; max-height:none;
      border:1px solid #223042;
      background:#0f1620;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    .spinner{
      position:absolute;
      inset:10px auto auto 10px;
      background:rgba(17,26,37,.85);
      border:1px solid #223042;
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      color:#9fb0c3;
      user-select:none;
    }

    a{ color:#9bd1ff; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .hint kbd{
      background:#111a25; border:1px solid #223042; border-bottom-width:2px;
      padding:2px 6px; border-radius:8px; font-size:12px;
    }

    /* Zoom (realocado para a linha de baixo, à direita) */
    .zoomGroup{ display:inline-flex; gap:8px; align-items:center; flex-wrap:wrap; }
    input[type="range"]{ width:220px; }
    #zoomLabel{
      background:#111a25; border:1px solid #223042;
      border-radius:999px; padding:3px 8px;
      font-size:12px; color:#9fb0c3;
    }
    .checkWrap{ display:inline-flex; gap:8px; align-items:center; }
    .checkWrap input{ width:auto; padding:0; }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <strong id="titleStrong" title="WRF = Weather Research and Forecasting">WRF chuva acumulada total RS</strong>

      <span class="muted">|</span>
      <label>
        variável:
        <select id="mosaicSelect" title="Seleciona o tipo de mosaico">
          <option value="chuva">Chuva acumulada</option>
          <option value="refletividade">Refletividade</option>
          <option value="tempo_severo">Tempo severo</option>
        </select>
      </label>

      <span id="modelSep" class="muted">|</span>
      <label id="modelWrap">
        modelo:
        <select id="modelSelect"
                title="ICON = Icosahedral Nonhydrostatic • ECMWF = European Centre for Medium-Range Weather Forecasts">
          <option value="icon" title="ICON = Icosahedral Nonhydrostatic">ICON</option>
          <option value="ecmwf" title="ECMWF = European Centre for Medium-Range Weather Forecasts">ECMWF</option>
        </select>
      </label>

      <span class="muted">|</span>
      <label>
        rodada:
        <select id="runSelect" title="Seleciona 00z ou 12z">
          <option value="00z">00z</option>
          <option value="12z">12z</option>
        </select>
      </label>

      <span class="muted">|</span>
      <span>Frame: <strong id="idxLabel">2</strong> / <span id="maxLabel">97</span></span>

      <span class="muted">|</span>
      <button id="prevBtn" title="Anterior (←)">← Anterior</button>
      <button id="nextBtn" title="Próximo (→)">Próximo →</button>

      <span class="muted">|</span>
      <label>
        Ir para:
        <input id="gotoInput" type="number" min="2" max="97" step="1" value="2" />
      </label>
      <button id="gotoBtn">OK</button>

      <span class="muted">|</span>
      <label title="0 = desliga. 1–3 = recomendado (prefetch leve, não preload total).">
        prefetch próximo:
        <input id="prefetchInput" class="tinyInput" type="number" min="0" max="12" step="1" value="6" />
      </label>

      <span class="muted">|</span>
      <button id="clearCacheBtn" title="Força recarregar as imagens (ignora cache do navegador/CDN)">Limpar cache</button>
    </div>

    <div class="barSplit muted hint">
      <div class="left">
        Teclado:
        <kbd>←</kbd>/<kbd>→</kbd> navega • <kbd>Home</kbd> 2 • <kbd>End</kbd> 97 •
        Zoom: <kbd>Ctrl</kbd>+<kbd>roda</kbd>, <kbd>+</kbd>/<kbd>-</kbd> • <kbd>0</kbd> reset • <kbd>F</kbd> ajustar • arraste para pan
      </div>

      <div class="right">
        <span class="zoomGroup" title="Atalhos: Ctrl + roda do mouse, +/-, 0 (reset), F (fit)">
          <span id="zoomLabel">100%</span>
          <button id="zoomOutBtn" aria-label="Zoom -">−</button>
          <button id="zoomInBtn" aria-label="Zoom +">+</button>
          <button id="zoomResetBtn" title="Reset (0)">Reset</button>
          <button id="zoomFitBtn" title="Ajustar à tela (F)">Fit</button>
          <input id="zoomRange" type="range" min="25" max="600" step="5" value="100" />
        </span>

        <label class="checkWrap" title="Se desmarcar, aplica Fit a cada frame">
          <input id="keepZoomChk" type="checkbox" checked />
          manter zoom
        </label>
      </div>
    </div>
  </header>

  <main>
    <div id="viewport" title="Arraste para mover. Ctrl + roda para zoom.">
      <div class="frameWrap">
        <img id="img" alt="WRF frame" decoding="async" draggable="false" />
        <div id="spinner" class="spinner" style="display:none;">carregando…</div>
      </div>
    </div>
  </main>

  <footer>
    <div class="bar">
      <span class="muted">URL:</span>
      <a id="urlLink" href="#" target="_blank" rel="noreferrer noopener">—</a>
      <span id="status" class="muted"></span>
    </div>
  </footer>

<script>
(() => {
  // ======= CONFIG =======
  const EXT = ".png";

  // Config por variável/mosaico
  const MOSAICS = {
    chuva: {
      label: "WRF chuva acumulada total RS",
      root: "https://sigmameteorologia.com/produtos/wrf_produtos//",
      prefix: "wrf_mosaico_chuva_acum_total_rs_", // + (00z|12z) + _ + idx + .png
      min: 2,
      max: 97,
      modelEnabled: false
    },
    refletividade: {
      label: "WRF refletividade RS",
      root: "https://sigmameteorologia.com/produtos/wrf_produtos//",
      prefix: "wrf_mosaico_maxdbz_rs_", // + (00z|12z) + _ + idx + .png
      min: 2,
      max: 97,
      modelEnabled: false
    },
    tempo_severo: {
      label: "WRF tempo severo RS",
      rootsByModel: {
        icon: "https://sigmameteorologia.com/produtos/wrf_icon//",
        ecmwf: "https://sigmameteorologia.com/produtos/wrf_ecmwf//",
      },
      prefix: "wrf_mosaico_tempo_severo_rs_", // + (00z|12z) + _ + idx + .png
      min: 2,
      max: 97,
      modelEnabled: true
    }
  };

  // Cache em memória (evita baixar de novo ao voltar).
  // Ajusta automaticamente pelo deviceMemory (quando disponível) para equilibrar desempenho x RAM.
  const DEVICE_MEM_GB = navigator.deviceMemory || 4;
  const CACHE_LIMIT = Math.min(42, Math.max(18, Math.round(DEVICE_MEM_GB * 5))); // 4GB→20 | 8GB→40 (cap)
  const WARM_CACHE_LIMIT = Math.min(30, Math.max(10, Math.round(CACHE_LIMIT * 0.7)));

  // Zoom
  const ZOOM_MIN = 0.25;
  const ZOOM_MAX = 6.00;
  const ZOOM_STEP = 0.10;

  // ======= STATE =======
  let mosaic = "chuva"; // chuva | tempo_severo
  let model  = "icon";  // icon | ecmwf
  let run    = "00z";   // 00z | 12z

  let MIN = MOSAICS[mosaic].min;
  let MAX = MOSAICS[mosaic].max;
  let idx = MIN;

  let navToken = 0;     // evita “corrida” ao apertar setas muito rápido

  // Cache-busting: força buscar imagens mais recentes mesmo que o .png seja sobrescrito no servidor/CDN
  const makeBust = () => `${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 8)}`;
  let cacheBust = makeBust();
  function bumpCacheBust() { cacheBust = makeBust(); }
  function withBust(url) {
    const sep = url.includes("?") ? "&" : "?";
    return `${url}${sep}v=${cacheBust}`;
  }

  let zoom = 1.0;
  let naturalW = 0;
  let naturalH = 0;

  let didInitialFit = false; // aplica Fit automaticamente ao abrir

  // LRU cache: key -> { img: HTMLImageElement, at: number }
  // key = `${mosaic}:${model}:${run}:${idx}`
  const cache = new Map();
  const warmCache = new Map(); // prefetch (não expulsa o que você já viu)
  const inflight = new Map(); // key -> Promise<HTMLImageElement>

  // ======= ELEMENTS =======
  const viewport    = document.getElementById("viewport");
  const imgEl       = document.getElementById("img");
  const spinner     = document.getElementById("spinner");
  const idxLabel    = document.getElementById("idxLabel");
  const maxLabel    = document.getElementById("maxLabel");
  const urlLink     = document.getElementById("urlLink");
  const statusEl    = document.getElementById("status");
  const titleStrong = document.getElementById("titleStrong");

  const prevBtn   = document.getElementById("prevBtn");
  const nextBtn   = document.getElementById("nextBtn");
  const gotoInput = document.getElementById("gotoInput");
  const gotoBtn   = document.getElementById("gotoBtn");

  const prefetchInput = document.getElementById("prefetchInput");
  const runSelect      = document.getElementById("runSelect");
  const mosaicSelect   = document.getElementById("mosaicSelect");
  const modelSelect    = document.getElementById("modelSelect");
  const modelWrap      = document.getElementById("modelWrap");
  const modelSep       = document.getElementById("modelSep");

  const clearCacheBtn  = document.getElementById("clearCacheBtn");

  // Zoom UI (realocado)
  const zoomRange    = document.getElementById("zoomRange");
  const zoomLabel    = document.getElementById("zoomLabel");
  const zoomInBtn    = document.getElementById("zoomInBtn");
  const zoomOutBtn   = document.getElementById("zoomOutBtn");
  const zoomResetBtn = document.getElementById("zoomResetBtn");
  const zoomFitBtn   = document.getElementById("zoomFitBtn");
  const keepZoomChk  = document.getElementById("keepZoomChk");

  function clamp(n) { return Math.min(MAX, Math.max(MIN, n)); }
  function clampZoom(z) { return Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, z)); }
  function setStatus(text) { statusEl.textContent = text ? `| ${text}` : ""; }
  function showSpinner(on) { spinner.style.display = on ? "" : "none"; }

  function currentCfg() { return MOSAICS[mosaic]; }

  function currentRoot() {
    const cfg = currentCfg();
    if (cfg.rootsByModel) return cfg.rootsByModel[model] || cfg.rootsByModel.icon;
    return cfg.root;
  }

  function makeUrlBase(n) {
    const cfg = currentCfg();
    return `${currentRoot()}${cfg.prefix}${run}_${n}${EXT}`;
  }

  function makeUrl(n) {
    return withBust(makeUrlBase(n));
  }

  function syncBoundsFromCfg() {
    const cfg = currentCfg();
    MIN = cfg.min;
    MAX = cfg.max;

    maxLabel.textContent = String(MAX);
    gotoInput.min = String(MIN);
    gotoInput.max = String(MAX);
  }

  function syncTitleAndModelUI() {
    const cfg = currentCfg();
    titleStrong.textContent = cfg.label;

    // Para chuva, não mostra o seletor de modelo (não é necessário)
    const showModel = !!cfg.modelEnabled;
    modelWrap.style.display = showModel ? "" : "none";
    modelSep.style.display  = showModel ? "" : "none";

    // Tooltip mantém o significado das siglas sem ocupar espaço
    modelSelect.title = "ICON = Icosahedral Nonhydrostatic • ECMWF = European Centre for Medium-Range Weather Forecasts";
  }

  // ======= LRU CACHE =======
  function touchCache(key, entry) {
    cache.delete(key);
    cache.set(key, entry);
    while (cache.size > CACHE_LIMIT) {
      const oldestKey = cache.keys().next().value;
      cache.delete(oldestKey);
    }
  }

  function touchWarm(key, entry) {
    warmCache.delete(key);
    warmCache.set(key, entry);
    while (warmCache.size > WARM_CACHE_LIMIT) {
      const oldestKey = warmCache.keys().next().value;
      warmCache.delete(oldestKey);
    }
  }

  function getCachedForDisplay(n) {
    const key = `${mosaic}:${model}:${run}:${n}`;

    const main = cache.get(key);
    if (main) {
      touchCache(key, main);
      return main.img;
    }

    const warm = warmCache.get(key);
    if (warm) {
      warmCache.delete(key);
      touchCache(key, warm);
      return warm.img;
    }

    return null;
  }

  function getCachedAny(n) {
    const key = `${mosaic}:${model}:${run}:${n}`;
    return (cache.get(key)?.img) || (warmCache.get(key)?.img) || null;
  }


  async function loadImage(n, { priority = "high", kind = "display" } = {}) {
    // kind: "display" | "prefetch"
    const cached = (kind === "display") ? getCachedForDisplay(n) : getCachedAny(n);
    if (cached) return cached;

    const ctxMosaic = mosaic;
    const ctxModel = model;
    const ctxRun = run;
    const ctxBust = cacheBust;

    const key = `${ctxMosaic}:${ctxModel}:${ctxRun}:${n}`;

    let task = inflight.get(key);
    if (!task) {
      const url = makeUrl(n);
      task = (async () => {
        const im = new Image();
        im.decoding = "async";
        try { im.fetchPriority = priority; } catch (_) {}

        await new Promise((resolve, reject) => {
          im.onload = resolve;
          im.onerror = reject;
          im.src = url;
        });

        if (im.decode) {
          try { await im.decode(); } catch (_) {}
        }

        return im;
      })();

      inflight.set(key, task);
      task.finally(() => { inflight.delete(key); });
    }

    const im = await task;

    if (ctxMosaic !== mosaic || ctxModel !== model || ctxRun !== run || ctxBust !== cacheBust) {
      return im;
    }

    const entry = { img: im, at: Date.now() };
    if (kind === "prefetch") {
      touchWarm(key, entry);
    } else {
      touchCache(key, entry);
    }

    if (kind === "display") {
      return getCachedForDisplay(n) || im;
    }
    return im;
  }

  function updateHeader() {
    idxLabel.textContent = String(idx);
    gotoInput.value = String(idx);

    const base = makeUrlBase(idx);
    urlLink.textContent = base;
    urlLink.href = base;
  }

  function applyZoom(keepCenter = true) {
    if (!naturalW || !naturalH) return;

    zoom = clampZoom(zoom);

    const w = Math.round(naturalW * zoom);
    const h = Math.round(naturalH * zoom);

    let cx = 0, cy = 0;
    if (keepCenter) {
      cx = viewport.scrollLeft + viewport.clientWidth / 2;
      cy = viewport.scrollTop + viewport.clientHeight / 2;

      const prevW = imgEl.offsetWidth || w;
      const prevH = imgEl.offsetHeight || h;

      const rx = prevW ? (cx / prevW) : 0.5;
      const ry = prevH ? (cy / prevH) : 0.5;

      imgEl.style.width = w + "px";
      imgEl.style.height = h + "px";

      viewport.scrollLeft = Math.max(0, Math.round(rx * w - viewport.clientWidth / 2));
      viewport.scrollTop  = Math.max(0, Math.round(ry * h - viewport.clientHeight / 2));
    } else {
      imgEl.style.width = w + "px";
      imgEl.style.height = h + "px";
    }

    zoomRange.value = String(Math.round(zoom * 100));
    zoomLabel.textContent = `${Math.round(zoom * 100)}%`;
  }

  function fitToViewport() {
    if (!naturalW || !naturalH) return;
    const pad = 16;
    const vw = Math.max(1, viewport.clientWidth - pad);
    const vh = Math.max(1, viewport.clientHeight - pad);

    zoom = clampZoom(Math.min(vw / naturalW, vh / naturalH));
    applyZoom(false);

    viewport.scrollLeft = 0;
    viewport.scrollTop = 0;
  }

  async function render(targetIdx) {
    const myToken = ++navToken;
    idx = clamp(targetIdx);
    updateHeader();

    showSpinner(true);
    setStatus("carregando…");

    try {
      const im = await loadImage(idx, { priority: "high", kind: "display" });
      if (myToken !== navToken) return;

      naturalW = im.naturalWidth || naturalW;
      naturalH = im.naturalHeight || naturalH;

      imgEl.src = im.src;

      // Comportamento do “manter zoom”
      if (!keepZoomChk.checked) {
        fitToViewport();
        didInitialFit = true; // já está “ajustado”
      } else if (!didInitialFit) {
        fitToViewport();
        didInitialFit = true;
      } else {
        applyZoom(false);
      }

      showSpinner(false);
      setStatus("");

      schedulePrefetch();
    } catch (e) {
      if (myToken !== navToken) return;
      showSpinner(false);
      setStatus("erro ao carregar (imagem pode não existir)");
    }
  }

  // Prefetch (janela ao redor do frame atual) — otimiza avanço e retorno.
  // Estratégia:
  //  - Prefetch vai para um warm-cache separado (não expulsa o que você já viu).
  //  - Fila com concorrência limitada (evita travar a rede/UI).
  //  - Pré-carrega para frente e para trás (alternando), para navegação instantânea.

  let prefetchJobId = 0;
  let prefetchQueue = [];
  let prefetchSet = new Set();
  let prefetchActive = 0;

  function connType(){
    const c = navigator.connection;
    return c?.effectiveType || "";
  }

  function effectivePrefetchK(rawK){
    const c = navigator.connection;
    if (c?.saveData) return 0;
    const t = connType();
    if (t === "slow-2g" || t === "2g") return Math.min(2, rawK);
    if (t === "3g") return Math.min(4, rawK);
    return rawK;
  }

  function prefetchConcurrency(){
    const c = navigator.connection;
    if (c?.saveData) return 1;
    const t = connType();
    if (t === "slow-2g" || t === "2g") return 1;
    if (t === "3g") return 2;
    if (t === "4g") return 4;
    return 3;
  }

  function enqueuePrefetch(n){
    if (n < MIN || n > MAX) return;
    if (prefetchSet.has(n)) return;

    const key = `${mosaic}:${model}:${run}:${n}`;
    if (cache.has(key) || warmCache.has(key) || inflight.has(key)) return;

    prefetchSet.add(n);
    prefetchQueue.push(n);
  }

  function runPrefetch(jobId){
    if (jobId !== prefetchJobId) return;

    const maxConc = prefetchConcurrency();
    while (prefetchActive < maxConc && prefetchQueue.length){
      const n = prefetchQueue.shift();
      prefetchSet.delete(n);

      const key = `${mosaic}:${model}:${run}:${n}`;
      if (cache.has(key) || warmCache.has(key) || inflight.has(key)) continue;

      prefetchActive++;
      loadImage(n, { priority: "low", kind: "prefetch" })
        .catch(() => {})
        .finally(() => {
          prefetchActive--;
          if (jobId !== prefetchJobId) return;
          if ("requestIdleCallback" in window) {
            requestIdleCallback(() => runPrefetch(jobId), { timeout: 800 });
          } else {
            setTimeout(() => runPrefetch(jobId), 0);
          }
        });
    }
  }

  function schedulePrefetch() {
    const k0 = Math.min(12, Math.max(0, parseInt(prefetchInput.value, 10) || 0));
    const k = effectivePrefetchK(k0);

    prefetchJobId++;
    prefetchQueue = [];
    prefetchSet.clear();

    if (k <= 0) return;

    for (let d = 1; d <= k; d++) {
      enqueuePrefetch(idx + d);
      enqueuePrefetch(idx - d);
    }

    const myJob = prefetchJobId;
    if ("requestIdleCallback" in window) {
      requestIdleCallback(() => runPrefetch(myJob), { timeout: 800 });
    } else {
      setTimeout(() => runPrefetch(myJob), 60);
    }
  }

  function prev() { render(idx - 1); }
  function next() { render(idx + 1); }

  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);

  function goToValue() {
    const n = clamp(parseInt(gotoInput.value, 10));
    render(n);
  }
  gotoBtn.addEventListener("click", goToValue);
  gotoInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") goToValue();
  });

  function resetNavigationContext({ keepIdx = true, bust = true } = {}) {
    cache.clear();
    warmCache.clear();
    inflight.clear();
    // cancela prefetch em andamento
    try { prefetchJobId++; prefetchQueue = []; prefetchSet.clear(); prefetchActive = 0; } catch(_){ }
    if (bust) bumpCacheBust();
    navToken++;        // cancela render em andamento
    didInitialFit = false;
    idx = keepIdx ? clamp(idx) : MIN;
  }

  // Limpar cache (botão) — força recarregar ignorando cache do navegador
  clearCacheBtn.addEventListener("click", async () => {
    setStatus("forçando atualização…");

    // Limpa cache em memória + muda o token de versão (cache-busting)
    resetNavigationContext({ keepIdx: true, bust: true });

    // Tenta limpar Cache Storage (se existir; ex.: PWA / service worker)
    try {
      if ("caches" in window) {
        const keys = await caches.keys();
        await Promise.all(keys.map(k => caches.delete(k)));
      }
    } catch (_) {}

    await render(idx);

    setStatus("cache limpo");
    setTimeout(() => setStatus(""), 900);
  });

  // Troca variável/mosaico
  mosaicSelect.addEventListener("change", () => {
    mosaic = mosaicSelect.value;
    syncBoundsFromCfg();
    syncTitleAndModelUI();
    resetNavigationContext({ keepIdx: true });
    render(idx);
  });

  // Troca modelo (ICON/ECMWF)
  modelSelect.addEventListener("change", () => {
    model = modelSelect.value;
    resetNavigationContext({ keepIdx: true });
    render(idx);
  });

  // Troca 00z/12z
  runSelect.addEventListener("change", () => {
    run = runSelect.value;
    resetNavigationContext({ keepIdx: true });
    render(idx);
  });

  // ======= ZOOM CONTROLS =======
  function zoomBy(delta) {
    zoom = clampZoom(zoom + delta);
    applyZoom(true);
  }

  zoomInBtn.addEventListener("click", () => zoomBy(ZOOM_STEP));
  zoomOutBtn.addEventListener("click", () => zoomBy(-ZOOM_STEP));

  zoomRange.addEventListener("input", () => {
    zoom = clampZoom((parseInt(zoomRange.value, 10) || 100) / 100);
    applyZoom(true);
  });

  zoomResetBtn.addEventListener("click", () => {
    zoom = 1.0;
    applyZoom(false);
    viewport.scrollLeft = 0;
    viewport.scrollTop = 0;
  });

  zoomFitBtn.addEventListener("click", fitToViewport);

  // Ctrl + roda do mouse para zoom
  viewport.addEventListener("wheel", (e) => {
    if (!e.ctrlKey) return;
    e.preventDefault();
    const dir = Math.sign(e.deltaY);
    const factor = dir > 0 ? -ZOOM_STEP : ZOOM_STEP;
    zoomBy(factor);
  }, { passive: false });

  // Pan arrastando (mouse)
  let dragging = false;
  let dragStartX = 0, dragStartY = 0, startScrollLeft = 0, startScrollTop = 0;

  viewport.addEventListener("mousedown", (e) => {
    if (e.button !== 0) return;
    dragging = true;
    viewport.classList.add("dragging");
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    startScrollLeft = viewport.scrollLeft;
    startScrollTop = viewport.scrollTop;
  });

  window.addEventListener("mousemove", (e) => {
    if (!dragging) return;
    const dx = e.clientX - dragStartX;
    const dy = e.clientY - dragStartY;
    viewport.scrollLeft = startScrollLeft - dx;
    viewport.scrollTop = startScrollTop - dy;
  });

  window.addEventListener("mouseup", () => {
    dragging = false;
    viewport.classList.remove("dragging");
  });

  // Teclado
  window.addEventListener("keydown", (e) => {
    const tag = (document.activeElement?.tagName || "").toLowerCase();
    const isTyping = tag === "input" || tag === "textarea" || tag === "select";
    if (isTyping && e.key !== "Escape") return;

    if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
    else if (e.key === "ArrowRight") { e.preventDefault(); next(); }
    else if (e.key === "Home") { e.preventDefault(); render(MIN); }
    else if (e.key === "End") { e.preventDefault(); render(MAX); }
    else if (e.key === "+" || e.key === "=") { e.preventDefault(); zoomBy(ZOOM_STEP); }
    else if (e.key === "-" || e.key === "_") { e.preventDefault(); zoomBy(-ZOOM_STEP); }
    else if (e.key === "0") { e.preventDefault(); zoomResetBtn.click(); }
    else if (e.key === "f" || e.key === "F") { e.preventDefault(); fitToViewport(); }
  });

  window.addEventListener("resize", () => {
    applyZoom(false);
  });

  // ======= INIT =======
  mosaicSelect.value = mosaic;
  modelSelect.value  = model;
  runSelect.value    = run;

  syncBoundsFromCfg();
  syncTitleAndModelUI();
  updateHeader();

  render(MIN);
})();
</script>
</body>
</html>
